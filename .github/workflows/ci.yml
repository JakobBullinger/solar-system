# CI — build, unit tests, a headless-Chrome render smoke test, and the full
# Playwright e2e suite.
#
# Mirrors the repo's manual verification bar (CLAUDE.md / ORCHESTRATION.md):
#   1. node build.js exits clean
#   2. npm test green (test/run.js — physics, almanac, challenge links,
#      and the baked-trajectory regression guard)
#   3. dist/index.html actually renders under headless Chrome + SwiftShader
#      (plain --disable-gpu yields a black canvas), asserted by sampling the
#      screenshot's pixels; the PNG is uploaded as a build artifact.
#   4. The e2e job runs the whole tools/e2e/*.spec.js suite (npm run e2e)
#      against the runner's preinstalled system Chrome — the same
#      channel:'chrome' + SwiftShader recipe the specs use locally. It is a
#      SEPARATE job so a red e2e never hides the fast smoke signal; on
#      failure it uploads tools/e2e/artifacts/ (spec screenshots + Playwright
#      test-results) as the debugging payload.
name: CI

# push is restricted to main so a PR branch push triggers exactly ONE run
# (the pull_request one) instead of duplicating the whole matrix (~2x 3.5 min
# of e2e per push). deploy.yml is already main-only.
on:
  push:
    branches: [main]
  pull_request:
  # Manual firing for when GitHub drops a branch's pull_request events
  # (twice on 2026-07-08 — PRs #22/#24 never got checks while sibling PRs
  # triggered fine): gh workflow run CI --ref <branch>
  workflow_dispatch:

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: node build.js

      - name: Unit tests
        run: npm test

      - name: Headless Chrome smoke screenshot
        run: |
          google-chrome --headless --no-sandbox --disable-dev-shm-usage \
            --use-angle=swiftshader --enable-unsafe-swiftshader \
            --force-prefers-reduced-motion \
            --window-size=1600,1000 --virtual-time-budget=15000 \
            --screenshot="$PWD/smoke.png" "file://$PWD/dist/index.html"

      - name: Assert screenshot shows a rendered scene
        run: node test/ci/check-screenshot.js smoke.png

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshot
          path: smoke.png
          if-no-files-found: ignore

  # Full browser e2e suite. Single worker by design (~5 min): the specs share
  # one Chrome profile dir and assert rendered pixels, so parallelism buys
  # nothing but flakes. The runner's preinstalled Google Chrome lives at
  # /opt/google/chrome/chrome — exactly where Playwright's channel:'chrome'
  # looks on Linux — so no browser download or install step is needed.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dev dependencies (Playwright test runner only)
        run: npm install

      - name: Build
        run: node build.js

      - name: Playwright e2e suite (system Chrome + SwiftShader)
        run: npm run e2e

      - name: Upload e2e failure artifacts (spec screenshots + test-results)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: tools/e2e/artifacts/
          if-no-files-found: ignore
